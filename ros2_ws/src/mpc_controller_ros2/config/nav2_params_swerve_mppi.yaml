# ============================================================
# nav2 파라미터 - Swerve Drive Spline-MPPI
# ============================================================
# 사용법:
#   ros2 launch mpc_controller_ros2 mppi_ros2_control_nav2.launch.py controller:=swerve
#
# Swerve Drive 로봇 (홀로노믹, vx/vy/omega 3축 제어)
# Spline-MPPI: B-spline basis로 P개 knot → N개 보간 (C² 연속 보장)
#
# 튜닝 참조: MizuhoAOKI/mppi_swerve_drive_ros (IROS 2024)
#   K=3000, dt=0.033, lambda=200, sigma=[0.55,0.55,0.96]
#   collision_penalty=50 (단일), sg_filter half=4 poly=6
# ============================================================

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0    # 10→20Hz (Aoki: 20Hz = 1/0.05s)
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.5
    transform_tolerance: 1.0
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    # Progress checker
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3
      movement_time_allowance: 30.0

    # Goal checker
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.4
      stateful: true

    # ---- Swerve Drive Spline-MPPI Controller ----
    FollowPath:
      plugin: "mpc_controller_ros2::SplineMPPIControllerPlugin"
      motion_model: "swerve"

      # Prediction horizon — 2초 예측 (Aoki: N=30*0.033=1s, 우리: 40*0.05=2s)
      N: 40
      dt: 0.05

      # Sampling — 샘플 수 증가로 좁은 통로 탐색 강화
      K: 2048
      lambda: 100.0     # 10→100 (Aoki: 200, 최적 궤적 집중도 향상)

      # Noise parameters (vx, vy, omega) — 탐색 범위 확대
      noise_sigma_v: 0.5
      noise_sigma_vy: 0.4       # 0.2→0.4 (lateral 탐색 강화)
      noise_sigma_omega: 0.8    # 0.2→0.8 (Aoki: 0.96, 회전 탐색 핵심)

      # Control limits
      v_max: 1.5
      v_min: -0.3    # -0.1→-0.3 (좁은 통로 빠져나오기 위해 후진 허용)
      omega_max: 2.0
      omega_min: -2.0

      # State tracking cost weights (Q: x, y, theta)
      Q_x: 10.0
      Q_y: 10.0
      Q_theta: 5.0     # 3→5 (Aoki angular_error=30, heading 추종 강화)

      # Terminal cost weights (Qf)
      Qf_x: 20.0
      Qf_y: 20.0
      Qf_theta: 10.0   # 6→10 (terminal heading 보정)

      # Control effort weights (R: vx, vy, omega)
      R_v: 0.3
      R_vy: 0.5       # 1.0→0.5 (lateral 사용 덜 억제 → 홀로노믹 활용)
      R_omega: 0.5     # 0.8→0.5 (회전 덜 억제)

      # Control rate weights (R_rate: vx, vy, omega)
      R_rate_v: 0.5
      R_rate_vy: 0.5
      R_rate_omega: 0.8   # 1.0→0.8

      # Obstacle avoidance — 단일 costmap 비용으로 통합 (3중 페널티 제거)
      obstacle_weight: 0.0         # 300→0 (costmap cost로 통합)
      safety_distance: 0.4         # 0.5→0.4

      # Costmap obstacle cost — 참조 대비 적절한 단일 페널티
      use_costmap_cost: true
      costmap_lethal_cost: 200.0   # 5000→200 (Aoki: 50, 우리 costmap은 해상도 다름)
      costmap_critical_cost: 50.0  # 500→50
      lookahead_dist: 2.0          # 1.5→2.0 (N*dt=2s에 맞춤)
      min_lookahead: 0.5
      goal_slowdown_dist: 0.5

      # Forward preference
      prefer_forward_weight: 5.0          # 10→5 (과도한 후진 억제 완화)
      prefer_forward_linear_ratio: 0.5
      prefer_forward_velocity_incentive: 1.0  # 2.0→1.0

      # Control smoothing (EMA 출력 필터 — SG 필터 활성 시 무시됨)
      control_smoothing_alpha: 0.7

      # Trajectory Stability — SG filter 강화 (Aoki: half=4, poly=6)
      sg_filter_enabled: true
      sg_half_window: 4            # 3→4 (Aoki: 4)
      sg_poly_order: 5             # 3→5 (Aoki: 6, N=40이면 5차가 적절)
      it_alpha: 0.975
      exploration_ratio: 0.1

      # Adaptive Temperature
      adaptive_temperature: true
      target_ess_ratio: 0.3        # 0.2→0.3 (다양성 약간 증가)
      adaptation_rate: 0.1
      lambda_min: 1.0              # 0.1→1.0 (최소 lambda 상향)
      lambda_max: 500.0            # 100→500 (범위 확대)

      # Spline-MPPI 전용 파라미터
      spline_num_knots: 15              # 12→15 (N=40에 맞춤)
      spline_degree: 3
      spline_auto_knot_sigma: true

      # SOTA 변형 (기본값)
      tsallis_q: 1.5
      cvar_alpha: 0.5
      svgd_num_iterations: 0
      svgd_step_size: 0.1
      svgd_bandwidth: -1.0
      smooth_R_jerk_v: 0.1
      smooth_R_jerk_omega: 0.1
      smooth_action_cost_weight: 1.0
      svg_num_guide_particles: 10
      svg_guide_iterations: 3
      svg_guide_step_size: 0.1
      svg_resample_std: 0.3

      # Non-Coaxial 전용 (swerve에서는 무시 — declare 필수)
      noise_sigma_delta_dot: 0.3
      R_delta_dot: 0.5
      R_rate_delta_dot: 1.0
      max_steering_rate: 2.0
      max_steering_angle: 1.5707

      # CBF (Control Barrier Function) 안전성 보장
      cbf_enabled: false
      cbf_gamma: 1.0
      cbf_safety_margin: 0.2      # 0.3→0.2 (좁은 통로 통과 허용)
      cbf_robot_radius: 0.2
      cbf_activation_distance: 2.0  # 3.0→2.0 (활성 장벽 수 감소)
      cbf_cost_weight: 100.0       # 500→100 (costmap과 이중 페널티 방지)
      cbf_use_safety_filter: true

      # Collision Debug (기본 OFF, ros2 param set으로 실시간 활성화)
      debug_collision_viz: false
      debug_cost_breakdown: true
      debug_collision_points: true
      debug_safety_footprint: true
      debug_cost_heatmap: true
      debug_footprint_radius: 0.3
      debug_heatmap_stride: 3

      # Visualization
      visualize_samples: true
      visualize_best: true
      visualize_weighted_avg: true
      visualize_reference: true
      visualize_text_info: true
      visualize_control_sequence: true
      visualize_tube: false
      visualize_cbf: false
      max_visualized_samples: 20
