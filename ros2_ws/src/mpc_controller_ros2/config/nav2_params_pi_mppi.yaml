# ============================================================
# nav2 파라미터 - pi-MPPI Projection MPPI (mpc_controller_ros2)
# ============================================================
# 사용법:
#   ros2 launch mpc_controller_ros2 mppi_ros2_control_nav2.launch.py controller:=pi_mppi
#
# Andrejev et al. (2025) "pi-MPPI: A Projection-based MPPI Scheme for
# Smooth Optimal Control" (IEEE RA-L 2025, arXiv 2504.10962)
#
# ADMM QP 투영 필터로 제어 크기/변화율/가속도 hard bounds 보장.
# ============================================================

controller_server:
  ros__parameters:
    # ---- pi-MPPI Controller ----
    FollowPath:
      plugin: "mpc_controller_ros2::PiMPPIControllerPlugin"
      motion_model: "diff_drive"

      # Prediction horizon
      N: 30
      dt: 0.1

      # Sampling
      K: 512
      lambda: 10.0

      # Noise parameters [v, omega]
      noise_sigma_v: 0.5
      noise_sigma_omega: 0.5

      # Control limits
      v_max: 0.5
      v_min: 0.0
      omega_max: 1.0
      omega_min: -1.0

      # State tracking cost weights (Q)
      Q_x: 10.0
      Q_y: 10.0
      Q_theta: 1.0

      # Terminal cost weights (Qf)
      Qf_x: 20.0
      Qf_y: 20.0
      Qf_theta: 2.0

      # Control effort weights (R)
      R_v: 0.1
      R_omega: 0.1

      # Control rate weights (R_rate)
      R_rate_v: 1.0
      R_rate_omega: 1.0

      # Obstacle avoidance
      obstacle_weight: 100.0
      safety_distance: 0.5

      # Costmap obstacle cost
      use_costmap_cost: true
      costmap_lethal_cost: 500.0
      costmap_critical_cost: 50.0
      lookahead_dist: 0.0
      min_lookahead: 0.5
      goal_slowdown_dist: 1.0

      # Forward preference
      prefer_forward_weight: 5.0
      prefer_forward_linear_ratio: 0.5

      # Adaptive Temperature
      adaptive_temperature: true
      target_ess_ratio: 0.5
      adaptation_rate: 0.1
      lambda_min: 0.1
      lambda_max: 100.0

      # ---- pi-MPPI Projection Filter ----
      pi_enabled: true
      pi_admm_iterations: 10        # ADMM 반복 (10이면 충분)
      pi_admm_rho: 1.0              # ADMM 페널티 파라미터
      pi_derivative_order: 2        # 1=rate만, 2=rate+accel
      pi_rate_max_v: 2.0            # m/s² (선속도 변화율)
      pi_rate_max_omega: 3.0        # rad/s² (각속도 변화율)
      pi_accel_max_v: 5.0           # m/s³ (jerk)
      pi_accel_max_omega: 8.0       # rad/s³ (각가속도 jerk)

      # Visualization
      visualize_samples: true
      visualize_best: true
      visualize_weighted_avg: true
      visualize_reference: true
      visualize_text_info: true
      visualize_control_sequence: true
      max_visualized_samples: 20
