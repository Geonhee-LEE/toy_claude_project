# ============================================================
# nav2 파라미터 - Shield-MPPI (per-step CBF + BR-MPPI + Conformal)
# ============================================================
# 사용법:
#   ros2 launch mpc_controller_ros2 mppi_ros2_control_nav2.launch.py \
#       controller:=shield
#
# 특징:
#   - ShieldMPPIControllerPlugin: 매 샘플/타임스텝 CBF 투영
#   - BarrierRateCost (BR-MPPI): 장벽 접근율 페널티
#   - ConformalPredictor (ACP): 동적 안전 마진 적응
#   - CBF 안전 필터: 최종 제어 투영
# ============================================================

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.5
    transform_tolerance: 1.0
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    # Progress checker
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.1
      movement_time_allowance: 60.0

    # Goal checker
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.35
      yaw_goal_tolerance: 0.5
      stateful: true

    # ---- Shield-MPPI Controller ----
    FollowPath:
      plugin: "mpc_controller_ros2::ShieldMPPIControllerPlugin"
      motion_model: "diff_drive"

      # 예측 지평선 (3초)
      N: 30
      dt: 0.1

      # 샘플링
      K: 256
      lambda: 10.0

      # 노이즈
      noise_sigma_v: 0.4
      noise_sigma_omega: 0.4

      # 제어 제약
      v_max: 0.5
      v_min: -0.1
      omega_max: 1.5
      omega_min: -1.5

      # 상태 추종 가중치
      Q_x: 10.0
      Q_y: 10.0
      Q_theta: 1.0

      # 터미널 비용
      Qf_x: 20.0
      Qf_y: 20.0
      Qf_theta: 2.0

      # 제어 비용
      R_v: 0.5
      R_omega: 0.3

      # 제어 변화율 비용
      R_rate_v: 2.0
      R_rate_omega: 1.0

      # 장애물 회피
      obstacle_weight: 100.0
      safety_distance: 0.4

      # Costmap
      use_costmap_cost: true
      costmap_lethal_cost: 500.0
      costmap_critical_cost: 50.0
      lookahead_dist: 0.0
      min_lookahead: 0.5
      goal_slowdown_dist: 1.5

      # Adaptive Temperature
      adaptive_temperature: true
      target_ess_ratio: 0.5
      adaptation_rate: 0.1
      lambda_min: 0.1
      lambda_max: 100.0

      # ---- CBF 안전 필터 (활성화) ----
      cbf_enabled: true
      cbf_gamma: 0.3
      cbf_safety_margin: 0.4
      cbf_activation_distance: 1.5

      # ---- Shield-MPPI 전용 (최적 시퀀스 CBF 투영) ----
      #   stride=1 → 즉시 다음 스텝만 투영 (receding horizon)
      #   max_iterations=3 → 빠른 수렴
      shield_cbf_stride: 1
      shield_max_iterations: 3

      # ---- BR-MPPI (Barrier Rate Cost) ----
      barrier_rate_cost_weight: 20.0

      # ---- Conformal Predictor (동적 안전 마진) ----
      conformal_enabled: true
      conformal_coverage: 0.95
      conformal_window_size: 100
      conformal_initial_margin: 0.3
      conformal_min_margin: 0.05
      conformal_max_margin: 1.0
      conformal_decay_rate: 0.99

      # 궤적 안정화
      sg_filter_enabled: true
      sg_half_window: 3
      sg_poly_order: 3
      it_alpha: 0.98
      exploration_ratio: 0.05

      # 시각화
      visualize_samples: true
      visualize_best: true
      visualize_weighted_avg: true
      visualize_reference: true
      visualize_text_info: true
      visualize_control_sequence: false
      max_visualized_samples: 20
