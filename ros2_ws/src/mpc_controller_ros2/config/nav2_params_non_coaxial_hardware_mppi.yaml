# ============================================================
# nav2 нҢҢлқјлҜён„° - Non-Coaxial Swerve Spline-MPPI (н•ҳл“ңмӣЁм–ҙ)
# ============================================================
# nav2_params_non_coaxial_mppi.yaml кё°л°ҳ, мӢӨм ң н•ҳл“ңмӣЁм–ҙ ліҖкІҪ:
#   - use_sim_time: false
#   - K: 1024 (мӢӨмӢңк°„ ліҙмһҘ)
#   - v_max: 1.0 (ліҙмҲҳм Ғ)
#   - cbf_enabled: true (мӢӨ лЎңлҙҮ м•Ҳм „)
#   - visualize_samples: false (лҢҖм—ӯнҸӯ м Ҳм•Ҫ)
#
# мӢӨн–ү:
#   ros2 launch mpc_controller_ros2 mppi_hardware_swerve.launch.py controller:=non_coaxial
# ============================================================

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.5
    transform_tolerance: 0.5   # 1.0вҶ’0.5
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    # Progress checker
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.1
      movement_time_allowance: 60.0

    # Goal checker
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.4
      stateful: true

    # ---- Non-Coaxial Swerve Spline-MPPI Controller (Hardware) ----
    FollowPath:
      plugin: "mpc_controller_ros2::SplineMPPIControllerPlugin"
      motion_model: "non_coaxial_swerve"

      # Prediction horizon
      N: 30
      dt: 0.1

      # Sampling
      K: 1024
      lambda: 10.0

      # Noise parameters вҖ” Non-Coaxial: control=[v, omega, delta_dot]
      noise_sigma_v: 0.5
      noise_sigma_omega: 0.3
      noise_sigma_delta_dot: 0.3

      # Control limits вҖ” ліҙмҲҳм Ғ (н•ҳл“ңмӣЁм–ҙ м•Ҳм „)
      v_max: 1.0              # 1.5вҶ’1.0
      v_min: -0.3             # -0.5вҶ’-0.3
      omega_max: 1.5          # 2.0вҶ’1.5
      omega_min: -1.5         # -2.0вҶ’-1.5
      vy_max: -1.0            # кё°ліёк°’ (non_coaxialмқҖ vy м—ҶмқҢ)

      # Non-Coaxial м „мҡ© мҠӨнӢ°м–ҙл§Ғ н•ңкі„
      max_steering_rate: 2.0
      max_steering_angle: 1.5707

      # State tracking cost weights (Q: x, y, theta)
      Q_x: 10.0
      Q_y: 10.0
      Q_theta: 3.0

      # Terminal cost weights (Qf)
      Qf_x: 20.0
      Qf_y: 20.0
      Qf_theta: 6.0

      # Control effort weights вҖ” Non-Coaxial: R=[v, omega, delta_dot]
      R_v: 0.3
      R_omega: 0.3
      R_delta_dot: 0.5
      R_vy: 0.1               # swerve м „мҡ© (declare н•„мҲҳ)

      # Control rate weights
      R_rate_v: 0.5
      R_rate_omega: 1.0
      R_rate_delta_dot: 1.5
      R_rate_vy: 1.0           # swerve м „мҡ© (declare н•„мҲҳ)

      # Swerve м „мҡ© noise (declare н•„мҲҳ)
      noise_sigma_vy: 0.2

      # Obstacle avoidance
      obstacle_weight: 20.0
      safety_distance: 0.2

      # Costmap obstacle cost
      use_costmap_cost: true
      costmap_lethal_cost: 200.0
      costmap_critical_cost: 20.0
      lookahead_dist: 1.5
      min_lookahead: 0.5
      goal_slowdown_dist: 0.5
      ref_theta_smooth_window: 5

      # Velocity Tracking Cost
      velocity_tracking_weight: 0.0
      reference_velocity: 0.8    # 1.0вҶ’0.8

      # Forward preference
      prefer_forward_weight: 3.0
      prefer_forward_linear_ratio: 0.5
      prefer_forward_velocity_incentive: 2.0

      # Control smoothing
      control_smoothing_alpha: 0.7

      # Trajectory Stability
      sg_filter_enabled: true
      sg_half_window: 3
      sg_poly_order: 3
      it_alpha: 0.9
      exploration_ratio: 0.1

      # Adaptive Temperature
      adaptive_temperature: true
      target_ess_ratio: 0.2
      adaptation_rate: 0.1
      lambda_min: 0.1
      lambda_max: 100.0

      # Spline-MPPI м „мҡ©
      spline_num_knots: 12
      spline_degree: 3
      spline_auto_knot_sigma: true

      # SOTA ліҖнҳ• (кё°ліёк°’)
      tsallis_q: 1.5
      cvar_alpha: 0.5
      svgd_num_iterations: 0
      svgd_step_size: 0.1
      svgd_bandwidth: -1.0
      smooth_R_jerk_v: 0.1
      smooth_R_jerk_omega: 0.1
      smooth_action_cost_weight: 1.0
      svg_num_guide_particles: 10
      svg_guide_iterations: 3
      svg_guide_step_size: 0.1
      svg_resample_std: 0.3

      # CBF вҖ” мӢӨм ң лЎңлҙҮ м•Ҳм „ (нҷңм„ұнҷ”)
      cbf_enabled: true          # falseвҶ’true
      cbf_gamma: 1.0
      cbf_safety_margin: 0.3
      cbf_robot_radius: 0.2
      cbf_activation_distance: 3.0
      cbf_cost_weight: 500.0
      cbf_use_safety_filter: true

      # Collision Debug (кё°ліё OFF)
      debug_collision_viz: false
      debug_cost_breakdown: false
      debug_collision_points: false
      debug_safety_footprint: false
      debug_cost_heatmap: false
      debug_footprint_radius: 0.3
      debug_heatmap_stride: 3

      # Visualization вҖ” лҢҖм—ӯнҸӯ м Ҳм•Ҫ
      visualize_samples: false
      visualize_best: true
      visualize_weighted_avg: false
      visualize_reference: true
      visualize_text_info: true
      visualize_control_sequence: false
      visualize_tube: false
      visualize_cbf: false
      max_visualized_samples: 10
