# ============================================================
# nav2 파라미터 - MPPI 스트레스 테스트 (고속 + CBF + 동적 장애물)
# ============================================================
# 사용법:
#   ros2 launch mpc_controller_ros2 mppi_ros2_control_nav2.launch.py \
#       controller:=stress_test \
#       world:=dynamic_obstacles_world.world \
#       map:=stress_test_map.yaml
#
# 기존 nav2_params_custom_mppi.yaml 대비 주요 변경:
#   - v_max: 0.5 → 1.5 m/s (3x 증가)
#   - controller_frequency: 10 Hz (안정적 제어)
#   - K: 512 (성능 최적화)
#   - CBF 안전 필터 활성화
#   - 장애물 비용 강화 (obstacle_weight: 100 → 200)
# ============================================================

controller_server:
  ros__parameters:
    progress_checker:
      required_movement_radius: 0.1
      movement_time_allowance: 60.0

    goal_checker:
      xy_goal_tolerance: 0.50
      yaw_goal_tolerance: 6.28

    # ---- Stress Test MPPI Controller ----
    FollowPath:
      plugin: "mpc_controller_ros2::MPPIControllerPlugin"
      motion_model: "diff_drive"

      # 예측 지평선 (3초, 고속 1.5m/s × 3s = 4.5m 선행)
      N: 30
      dt: 0.1

      # 샘플링 (고주파 대응 → K 줄임)
      K: 512
      lambda: 10.0

      # 노이즈 (고속 → 약간 증가)
      noise_sigma_v: 0.6
      noise_sigma_omega: 0.5

      # 제어 제약 (고속, 후진 최소화)
      v_max: 1.5
      v_min: -0.05
      omega_max: 2.0
      omega_min: -2.0

      # 상태 추종 가중치 (고속 → 경로 추종 강화)
      Q_x: 15.0
      Q_y: 15.0
      Q_theta: 1.5

      # 터미널 비용
      Qf_x: 30.0
      Qf_y: 30.0
      Qf_theta: 3.0

      # 제어 비용
      R_v: 0.5
      R_omega: 0.3

      # 제어 변화율 비용 (고속 → 급가속 억제, pitching 최소화)
      R_rate_v: 3.0
      R_rate_omega: 1.5

      # 장애물 회피 (고속 → 강화)
      obstacle_weight: 100.0
      safety_distance: 0.5

      # Costmap
      use_costmap_cost: true
      costmap_lethal_cost: 500.0
      costmap_critical_cost: 50.0
      lookahead_dist: 0.0
      min_lookahead: 0.5
      goal_slowdown_dist: 1.5

      # 후진 페널티 (v_min=-0.05 → 강한 전진 선호로 후진 억제)
      prefer_forward_weight: 50.0
      prefer_forward_linear_ratio: 0.8

      # Adaptive Temperature
      adaptive_temperature: true
      target_ess_ratio: 0.5
      adaptation_rate: 0.1
      lambda_min: 0.1
      lambda_max: 100.0

      # CBF 안전 필터 (기본 비활성화, 수렴 확인 후 활성화)
      cbf_enabled: false
      cbf_gamma: 0.3
      cbf_safety_margin: 0.5
      cbf_activation_distance: 2.5

      # 궤적 안정화
      sg_filter_enabled: true
      sg_half_window: 3
      sg_poly_order: 3
      it_alpha: 0.98
      exploration_ratio: 0.05

      # 시각화 (스트레스 테스트 시 꺼서 오버헤드 감소)
      visualize_samples: false
      visualize_best: true
      visualize_weighted_avg: true
      visualize_reference: true
      visualize_text_info: true
      visualize_control_sequence: false
      max_visualized_samples: 10
