# ============================================================
# nav2 파라미터 - RH-MPPI (Receding Horizon MPPI)
# ============================================================
# 사용법:
#   ros2 launch mpc_controller_ros2 mppi_ros2_control_nav2.launch.py controller:=rh_mppi
#
# 동적 예측 horizon N 조정:
#   - 고속 → 긴 horizon (먼 미래 예측)
#   - 저속/장애물 근접/큰 추적 오차 → 짧은 horizon (빠른 반응)
#   - EMA 스무딩으로 N 변화 시 jitter 방지
# ============================================================

controller_server:
  ros__parameters:
    # ---- RH-MPPI Controller ----
    FollowPath:
      plugin: "mpc_controller_ros2::RHMPPIControllerPlugin"
      motion_model: "diff_drive"

      # Prediction horizon (N_max로 사용됨)
      N: 50
      dt: 0.1

      # Sampling
      K: 512
      lambda: 10.0

      # Noise parameters
      noise_sigma_v: 0.5
      noise_sigma_omega: 0.5

      # Control limits
      v_max: 0.5
      v_min: 0.0
      omega_max: 1.0
      omega_min: -1.0

      # State tracking cost weights (Q)
      Q_x: 10.0
      Q_y: 10.0
      Q_theta: 1.0

      # Terminal cost weights (Qf)
      Qf_x: 20.0
      Qf_y: 20.0
      Qf_theta: 2.0

      # Control effort weights (R)
      R_v: 0.5
      R_omega: 0.3

      # Control rate weights (R_rate)
      R_rate_v: 1.0
      R_rate_omega: 0.5

      # ── RH-MPPI 파라미터 ──
      rh_mppi_enabled: true
      rh_N_min: 10                    # 최소 horizon (빠른 반응)
      rh_N_max: 50                    # 최대 horizon (먼 미래 예측)
      rh_speed_weight: 1.0            # 속도 팩터 가중치
      rh_obstacle_weight: 1.0         # 장애물 근접도 팩터 가중치
      rh_error_weight: 0.5            # 추적 오차 팩터 가중치
      rh_obs_dist_threshold: 2.0      # 장애물 거리 임계값 (m)
      rh_error_threshold: 1.0         # 추적 오차 임계값 (m)
      rh_smoothing_alpha: 0.3         # EMA 스무딩 계수

      # Costmap
      use_costmap_cost: true
      costmap_lethal_cost: 1000.0
      costmap_critical_cost: 100.0

      # CBF (기본 비활성화)
      cbf_enabled: false

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 10.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 6.0
      height: 6.0
      resolution: 0.05
      transform_tolerance: 5.0
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      resolution: 0.05
      transform_tolerance: 5.0
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55

planner_server:
  ros__parameters:
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5
      use_astar: true

bt_navigator:
  ros__parameters:
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 5.0
